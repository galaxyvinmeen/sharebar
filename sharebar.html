<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Floating Share Bar</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, sans-serif;
  }

  .float-bar {
    position: fixed;
    top: 40%;
    right: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 999999;
  }

  .float-bar a {
    padding: 10px 14px;
    color: white;
    text-decoration: none;
    border-radius: 6px 0 0 6px;
    font-size: 16px;
  }

  .fb { background: #1877F2; }
  .wa { background: #25D366; }
  .x  { background: #000000; }
  .li { background: #0A66C2; }
</style>
<body>

<div class="float-bar">
  <a class="fb" href="https://www.facebook.com/sharer/sharer.php?u=PAGE_URL" target="_blank">Facebook</a>
  <a class="wa" href="https://api.whatsapp.com/send?text=PAGE_URL" target="_blank">WhatsApp</a>
  <a class="x"  href="https://twitter.com/intent/tweet?url=PAGE_URL" target="_blank">X</a>
</div>

<script>
  // Replace PAGE_URL with the current page URL inside Google Sites
  const url = encodeURIComponent(window.top.location.href);
  document.querySelectorAll("a").forEach(a => {
    a.href = a.href.replace("PAGE_URL", url);
  });
</script>

</body>
</html>
